<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anandhu Pradeep - Certificates</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  
  <!-- Social Media Meta (Link Cards) -->
  <meta property="og:title" content="Anandhu Pradeep — Certificates">
  <meta property="og:description" content="A premium showcase of verified professional certificates and achievements.">
  <meta property="og:image" content="favicon.png">
  <meta property="og:type" content="website">
  <!-- Fonts: Space Grotesk for display, Inter for body -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Three.js for Space Background -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  
  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 3D SPACE BACKGROUND -->
  <canvas id="webgl-canvas"></canvas>

  <!-- Custom Cursor -->
  <div class="cursor-dot"></div>
  <div class="cursor-trail"></div>

  <!-- Premium Noise Texture -->
  <div class="noise-overlay"></div>

  <!-- Animated Glowing Orbs -->
  <div class="bg-orbs">
    <div class="orb orb-cyan"></div>
    <div class="orb orb-violet"></div>
  </div>

  <header class="header">
    <nav class="nav">
      <a href="https://portfolio.anandhupradeep.com/" class="back-link">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>
        </svg>
        Back to Portfolio
      </a>
    </nav>
    
    <div class="hero">
      <div class="hero-badge">
        <span class="hero-badge-text">Verified Credentials</span>
      </div>
      <h1 class="hero-title">Certificate Showcase</h1>
      <p class="hero-subtitle">A curated collection of professional achievements in software engineering, cloud computing, and advanced technologies.</p>
    </div>
    
    <!-- Dynamic Filter Buttons -->
    <div class="filter-container" id="filter-container"></div>
  </header>

  <main class="main-content">
    <!-- Grid injected via JS -->
    <div class="grid" id="cert-grid"></div>
  </main>

  <!-- Fullscreen Glass Dialog -->
  <dialog class="cert-dialog" id="cert-dialog">
    <div class="dialog-content">
      <button class="close-btn" id="close-dialog" aria-label="Close dialog">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>
        </svg>
        <span>Back</span>
      </button>

      <div class="dialog-body">
        <!-- Preview Panel -->
        <div class="dialog-preview" id="dialog-preview"></div>
        
        <!-- Info Panel -->
        <div class="dialog-info">
          <div class="dialog-badge" id="dialog-badge">Category</div>
          <h2 class="dialog-title" id="dialog-title">Certificate Title</h2>
          <p class="dialog-about" id="dialog-about">Details about this certificate.</p>
          
          <div class="dialog-meta">
            <div class="meta-item">
              <span class="meta-label">Issuer</span>
              <span class="meta-value" id="dialog-issuer">Issuer Name</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Date</span>
              <span class="meta-value" id="dialog-date">YYYY</span>
            </div>
          </div>
          
          <a href="#" class="glow-btn" id="dialog-download" download target="_blank" rel="noopener noreferrer">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            Download Certificate
          </a>
        </div>
      </div>
    </div>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
